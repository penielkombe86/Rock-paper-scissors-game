<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-paper-scissors</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <header>
        <h1>ROCK PAPER SCISSORS GAME</h1>
    </header>

    <main>
        <section>
            <div class="choice-container">
                <div class="human-choice-column">
                    <span class="choice-label">HUMAN</span>
                    <div id="human-choice"><p>Human</p></div>
                </div>
                <div class="computer-choice-column">
                    <span class="choice-label">COMPUTER</span>
                    <div id="comp-choice"><p>Computer</p></div>
                </div>  
            </div>
        </section>
        <section>
            <div class="button-container">
                <button id="rock-btn"><span>✊</span></button>
                <button id="paper-btn"><span>✋</span></button>
                <button id="scissors-btn"><span>✌️</span></button>
            </div>
        </section>
        <section>
            <div class="score-board">
                <div class="human-score-container">
                    <p>Human Score</p>
                    <p id="human-score">0</p>
                </div>
                <div class="computer-score-container">
                    <p>Computer Score</p>
                    <p id="computer-score">0</p>
                </div>
            </div>
        </section>
        <section>
            <div class="round">
                <button id="try-again">
                    You lose!!
                    try again
                </button>
                <button id="play-again">
                    You win!!
                    play again
                </button>
                <button id="tie">
                    it's a tie!!
                    play again
                </button>
            </div>
        </section>
    </main>
    <script src="index.js"></script>
</body>
</html>
